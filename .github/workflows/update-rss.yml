name: Update RSS Data

on:
  schedule:
    # 每30分钟轮询一次 RSS（有更新才会提交）
    - cron: '*/30 * * * *'
  # 允许手动触发
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-rss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Run RSS Parser
        run: node rss-parser.js

      - name: Check if episodes.json changed
        id: check_changes
        run: |
          if git diff --quiet episodes.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "RSS Update Bot"
          git add episodes.json
          git commit -m "chore: update RSS data $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push

      - name: No changes to commit
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "✅ episodes.json 无更新"
