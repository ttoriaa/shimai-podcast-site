name: RSS Site Sync

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      rss_url:
        description: RSS feed URL override
        required: false
        type: string
      update_command:
        description: Data update command override
        required: false
        type: string
      changed_paths:
        description: Comma-separated required output paths
        required: false
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      RSS_URL: ${{ inputs.rss_url || vars.PODCAST_RSS_URL }}
      UPDATE_COMMAND: ${{ inputs.update_command || vars.PODCAST_UPDATE_COMMAND || 'python ./scripts/rss_parser.py' }}
      CHANGED_PATHS: ${{ inputs.changed_paths || vars.PODCAST_CHANGED_PATHS || 'episodes.json' }}
      STATE_FILE: .cache/rss_state.json
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.GLM_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || vars.GLM_BASE_URL || 'https://open.bigmodel.cn/api/paas/v4' }}
      GLM_BASE_URL: ${{ vars.GLM_BASE_URL || 'https://open.bigmodel.cn/api/paas/v4' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync RSS to site data
        id: rss_sync
        run: python ./scripts/rss_sync.py

      - name: Commit and push when changed
        if: steps.rss_sync.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: auto sync podcast site data from RSS"
            git push
          else
            echo "No file changes to commit."
          fi

      - name: No change summary
        if: steps.rss_sync.outputs.changed != 'true'
        run: echo "RSS not changed, skip commit."
